<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PodcastAI</title>
    <!-- Preconnect to Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="landing-page">
    <!-- Header -->
    <header class="landing-header">
        <div class="header-container">
            <a href="/" class="logo animate-fade-up" style="text-decoration:none;">
                <div class="logo-icon">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M12 2C10.34 2 9 3.34 9 5V12C9 13.66 10.34 15 12 15C13.66 15 15 13.66 15 12V5C15 3.34 13.66 2 12 2Z"
                            fill="white" />
                        <path
                            d="M17 12C17 14.76 14.76 17 12 17C9.24 17 7 14.76 7 12H5C5 15.53 7.61 18.43 11 18.93V22H13V18.93C16.39 18.43 19 15.53 19 12H17Z"
                            fill="white" />
                    </svg>
                </div>
                <div class="logo-text">
                    <h1 style="color:var(--text-slate-900);">PodcastAI</h1>
                </div>
            </a>
            <div class="header-actions animate-fade-up delay-100">
                <a href="{{ url_for('signup') }}" class="btn btn-secondary">Create Account</a>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="auth-section">
        <div class="auth-card animate-fade-up">
            <div class="auth-header">
                <h2>Welcome Back</h2>
                <p>Sign in to your workspace.</p>
            </div>

            <!-- Flash Messages -->
            {% with messages = get_flashed_messages() %}
            {% if messages %}
            <div class="error animate-fade-up">
                {% for message in messages %}
                {{ message }}
                {% endfor %}
            </div>
            {% endif %}
            {% endwith %}

            <!-- Login Form -->
            <form method="POST" action="/login" class="auth-form animate-fade-up delay-100">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" name="username" id="username" placeholder="Type your username" required
                        autocomplete="username">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" name="password" id="password" placeholder="••••••••" required
                        autocomplete="current-password">
                </div>

                <button type="submit" class="btn btn-primary btn-large" style="width: 100%; margin-top: 1rem;">
                    Sign In
                </button>
            </form>

            <!-- Footer -->
            <div class="auth-footer animate-fade-up delay-200">
                Don't have an account yet?
                <a href="/signup">Sign up for free</a>
            </div>
        </div>
    </main>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>

</html>
